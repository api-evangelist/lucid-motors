aid: lucid-motors
name: Lucid Motors
description: >-
  Lucid Motors is the consumer-vehicle brand of Lucid Group, Inc.
  (NASDAQ: LCID), a Newark, California–headquartered American luxury
  electric vehicle manufacturer. The company designs and manufactures
  high-performance battery-electric sedans and SUVs, with its flagship
  Lucid Air (Pure, Touring, Grand Touring, and Sapphire trims) and the
  Lucid Gravity SUV (Touring and Grand Touring), assembled at its AMP-1
  factory in Casa Grande, Arizona. Lucid develops its own electric
  powertrain, battery, and software stack — including the Lucid UX
  in-vehicle experience, the Lucid mobile app, Lucid Assistant, and
  over-the-air updates — and operates a vertically integrated
  direct-to-consumer sales, financing, leasing, and service model
  across North America, Europe, and the Middle East, supported by a
  growing network of Lucid Studios, Service Centers, and DC fast
  charging partnerships. Lucid is majority-owned by Saudi Arabia's
  Public Investment Fund (PIF). Beyond consumer vehicles, Lucid
  licenses its powertrain and battery technology to other OEMs
  (notably Aston Martin) and supplies battery systems through its
  Lucid energy storage initiatives. Lucid Motors does not publish a
  public developer API portal, SDK, or OpenAPI specification; the
  Lucid mobile app and vehicle telematics are powered by private
  backend services that are not documented for third-party use.
